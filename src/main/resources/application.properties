spring.application.name=PruebaTecSupermercado

#==========
#DATASOURCE (H2)
#==========

spring.datasource.url=jdbc:h2:mem:superdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver 
spring.datasource.username=todocode
spring.datasource.password=

#==========
# JPA / HIBERNATE
#==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

#Para que H2 se porte como MySQL (importante para test)
spring.jpa.database-plataform=org.hibernate.dialect.H2Dialect

#==========
# H2 CONSOLE
#==========
spring.h2.console.enable=true
spring.h2.console.path=/h2-console
